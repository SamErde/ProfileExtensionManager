name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm test
      - name: Integration tests (Linux under Xvfb)
        if: runner.os == 'Linux'
        run: xvfb-run -a npm run test:integration
      - name: Integration tests
        if: runner.os != 'Linux'
        run: npm run test:integration
      - name: Package smoke test
        run: npx vsce package --allow-missing-repository
