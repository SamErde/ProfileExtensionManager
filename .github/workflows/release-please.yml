name: release-please

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

# Serialize runs: a release-PR merge and a fast follow-up push must not
# interleave their release/PR phases.
concurrency:
  group: release-please
  cancel-in-progress: false

# Three phases, deliberately ordered. This repo uses IMMUTABLE releases, so
# release-please creates DRAFT releases (mutable) and job 2 attaches the vsix
# before publishing. Because a draft has no tag and doesn't count as the
# "latest release", the release-PR phase MUST run only after the publish —
# otherwise release-please finds no boundary, re-collects the entire commit
# history, and opens an ever-incrementing garbage release PR (observed as
# PRs #13/#14 repeating the full changelog).
jobs:
  # Phase 1: process a merged release PR -> create the DRAFT release.
  # Never creates/updates release PRs (skip-github-pull-request).
  release:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      # Draft releases have no git tag until published — job 2 checks out by SHA.
      sha: ${{ steps.release.outputs.sha }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          # Default GITHUB_TOKEN. Note: releases/tags created with the default
          # GITHUB_TOKEN do NOT trigger other workflows (GitHub's
          # anti-recursion guard) — packaging runs as job 2 in this same run.
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          skip-github-pull-request: true

  # Phase 2: quality gates, package, attach vsix to the draft, publish.
  # Publishing creates the tag and immutability seals the release with assets.
  package-and-publish:
    needs: release
    if: ${{ needs.release.outputs.release_created }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # SHA, not tag: the draft release has no tag until published below.
          ref: ${{ needs.release.outputs.sha }}
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm test
      - name: Integration tests (Xvfb)
        run: xvfb-run -a npm run test:integration
      - name: Package extension
        run: npm run package
      - name: Attach VSIX to draft release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: gh release upload "${{ needs.release.outputs.tag_name }}" releases/*.vsix
      - name: Publish release (immutability seals it with assets attached)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: gh release edit "${{ needs.release.outputs.tag_name }}" --draft=false

      # Marketplace publish runs AFTER the GitHub release is sealed: the GitHub
      # release is the source of truth and stays consistent even if this step
      # fails (PAT expiry, marketplace scan rejection). Recovery from a failure
      # here is manual: download the released vsix and run
      # `npx vsce publish --packagePath <file>` with a valid VSCE_PAT.
      # TEMPORARY continue-on-error: the Marketplace rejects the display name
      # ("Profile Extension Manager" ~ existing "Private Extension Manager");
      # an exception request is pending with VSMarketplace@microsoft.com.
      # Remove continue-on-error once the listing succeeds.
      - name: Publish to VS Code Marketplace
        continue-on-error: true
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          if npx vsce publish --packagePath releases/*.vsix; then
            echo "Marketplace publish succeeded."
          else
            echo "::warning::Marketplace publish failed (expected while the display-name exception is pending). GitHub Release is unaffected."
            exit 1
          fi

  # Phase 3: create/update the NEXT release PR — only after any release from
  # this push is fully published, so the boundary lookup succeeds. Runs on
  # ordinary pushes too (phase 2 is skipped in that case).
  release-pr:
    needs: [release, package-and-publish]
    if: >-
      ${{ !cancelled()
          && needs.release.result == 'success'
          && contains(fromJSON('["success", "skipped"]'), needs.package-and-publish.result) }}
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          skip-github-release: true
